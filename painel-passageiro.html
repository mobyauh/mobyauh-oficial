<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBYAUH - Painel do Passageiro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_API_KEY&libraries=places"></script>
  <style>
    /* Estilos já definidos anteriormente */
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <form id="form-corrida" class="form-corrida">
        <div class="bloco-corrida">
          <label for="origem" class="campo-label">Local de origem</label>
          <input type="text" id="origem" placeholder="Digite a origem (ex: Rua A, Bairro B)">
          <div id="sugestoes-origem"></div>
        </div>

        <div class="bloco-corrida">
          <label for="destino" class="campo-label">Destino</label>
          <input type="text" id="destino" placeholder="Digite o destino (ex: Praça C, Bairro D)">
          <div id="sugestoes-destino"></div>
        </div>

        <div class="bloco-corrida">
          <button type="button" id="btn-calcular">SIMULAR ROTA E VALOR</button>
        </div>
      </form>

      <div id="mensagem"></div>
    </div>
  </div>

  <script>
    let autocompleteOrigem, autocompleteDestino;

    function initAutocomplete() {
      const options = {
        types: ['geocode'], // Excluir alguns tipos de busca, como restaurantes e locais específicos
        componentRestrictions: { country: 'br' } // Limitar a pesquisa para o Brasil
      };

      autocompleteOrigem = new google.maps.places.Autocomplete(document.getElementById('origem'), options);
      autocompleteDestino = new google.maps.places.Autocomplete(document.getElementById('destino'), options);

      // Evitar que o campo "origem" ou "destino" seja preenchido com valores indesejados.
      autocompleteOrigem.addListener('place_changed', function() {
        const place = autocompleteOrigem.getPlace();
        if (!place.geometry) {
          alert("Local não encontrado. Tente novamente.");
          return;
        }
        console.log("Origem selecionada:", place.formatted_address);
      });

      autocompleteDestino.addListener('place_changed', function() {
        const place = autocompleteDestino.getPlace();
        if (!place.geometry) {
          alert("Destino não encontrado. Tente novamente.");
          return;
        }
        console.log("Destino selecionado:", place.formatted_address);
      });
    }

    // Executar a inicialização do Google Places API
    google.maps.event.addDomListener(window, 'load', initAutocomplete);

    // Lógica de cálculo de rota e valor
    document.getElementById('btn-calcular').addEventListener('click', function() {
      const origem = document.getElementById('origem').value.trim();
      const destino = document.getElementById('destino').value.trim();

      if (!origem || !destino) {
        alert("Por favor, preencha os campos de origem e destino.");
        return;
      }

      // Aqui podemos adicionar a lógica de cálculo de distância e valor conforme a origem e o destino selecionado
      console.log("Simulação em andamento...");
      // Simulação de rota (substituir com lógica de cálculo real)
    });
  </script>
</body>
</html>

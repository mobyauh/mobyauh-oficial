<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBYAUH - Administração</title>
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-mobyauh.png">
  <link rel="apple-touch-icon" href="./assets/icon-mobyauh.png">
  <meta name="theme-color" content="#FFCC00">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 204, 0, 0.08), transparent 30%),
        linear-gradient(135deg, #111111, #1b1b1b 45%, #101010);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
      padding: 20px;
    }

    .page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .container {
      width: 100%;
      background: #232323;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 26px;
      padding: 30px 28px 28px;
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.50),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .brand-area {
      background: linear-gradient(180deg, rgba(255, 204, 0, 0.06), rgba(255, 204, 0, 0.02));
      border: 1px solid rgba(255, 204, 0, 0.10);
      border-radius: 22px;
      padding: 24px 18px 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .logo-ring {
      width: 128px;
      height: 128px;
      margin: 0 auto 18px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 204, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 204, 0, 0.08);
    }

    .logo-box {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: #FFCC00;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 14px 24px rgba(255, 204, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-name {
      color: #FFCC00;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .brand-line {
      width: 80px;
      height: 4px;
      border-radius: 999px;
      background: #FFCC00;
      margin: 0 auto 14px;
    }

    .brand-subtitle {
      color: #d0d0d0;
      font-size: 0.96rem;
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-area {
      max-width: 430px;
      margin: 0 auto;
    }

    label {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 8px;
      color: #e5e5e5;
      font-weight: 600;
    }

    input {
      width: 100%;
      background-color: #3a3a3a;
      border: 1px solid #4a4a4a;
      color: #fff;
      padding: 14px 15px;
      margin-bottom: 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #aaaaaa;
    }

    input:focus {
      border-color: #FFCC00;
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .btn-principal {
      background: #FFCC00;
      color: #1a1a1a;
      box-shadow: 0 10px 20px rgba(255, 204, 0, 0.15);
      margin-top: 6px;
    }

    .btn-secundario {
      background: transparent;
      color: #FFCC00;
      border: 2px solid #FFCC00;
    }

    .btn-rejeitar {
      background: transparent;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
    }

    .mensagem {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .painel-admin {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .topbar h2 {
      color: #FFCC00;
      font-size: 1.5rem;
    }

    .topbar p {
      color: #cfcfcf;
      margin-top: 4px;
      line-height: 1.5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .acoes-topo button {
      width: auto;
      min-width: 140px;
      padding: 12px 16px;
    }

    .contador {
      background: #2f2f2f;
      border: 1px solid rgba(255, 204, 0, 0.10);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 18px;
      color: #d9d9d9;
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .lista {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: #2e2e2e;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-left: 4px solid #FFCC00;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }

    .card.card-passageiro {
      border-left-color: #74b8ff;
    }

    .card h3 {
      color: #FFCC00;
      font-size: 1.12rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .card.card-passageiro h3 {
      color: #74b8ff;
    }

    .badges-card {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .badge-tipo {
      background: rgba(255, 204, 0, 0.15);
      color: #FFCC00;
    }

    .badge-passageiro {
      background: rgba(116, 184, 255, 0.16);
      color: #74b8ff;
    }

    .badge-servico {
      background: rgba(255, 204, 0, 0.12);
      color: #FFCC00;
      border: 1px solid rgba(255, 204, 0, 0.18);
    }

    .foto-area {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .foto-usuario {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      object-fit: cover;
      border: 3px solid #FFCC00;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      background: #3a3a3a;
    }

    .sem-foto {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      border: 2px dashed rgba(255, 204, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      color: #d0d0d0;
      font-size: 0.9rem;
      background: #3a3a3a;
    }

    .linha {
      background: #3a3a3a;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .linha strong {
      color: #FFCC00;
      display: block;
      margin-bottom: 4px;
      font-size: 0.86rem;
    }

    .linha span {
      color: #ffffff;
      word-break: break-word;
      line-height: 1.4;
    }

    .card.card-passageiro .linha strong {
      color: #74b8ff;
    }

    .card-acoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .card-acoes button {
      padding: 13px 12px;
      width: 100%;
    }

    .vazio {
      text-align: center;
      color: #d5d5d5;
      background: #2d2d2d;
      border-radius: 18px;
      padding: 26px 20px;
      border: 1px dashed rgba(255, 204, 0, 0.18);
      grid-column: 1 / -1;
    }

    .link-voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #FFCC00;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .link-voltar:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 18px;
      }

      .brand-name {
        font-size: 1.75rem;
      }

      .logo-ring {
        width: 112px;
        height: 112px;
      }

      .logo-box {
        width: 84px;
        height: 84px;
      }

      .card-acoes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="brand-area">
        <div class="logo-ring">
          <div class="logo-box">
            <img src="./assets/icon-mobyauh.png" alt="Ícone oficial MOBYAUH">
          </div>
        </div>

        <div class="brand-name">MOBYAUH ADMIN</div>
        <div class="brand-line"></div>
        <p class="brand-subtitle">
          Painel administrativo para aprovar ou rejeitar cadastros pendentes de motoristas e passageiros.
        </p>
      </div>

      <div id="bloco-login">
        <form id="form-login" class="form-area">
          <label for="email">E-mail do administrador</label>
          <input type="email" id="email" placeholder="Digite seu e-mail de administrador" autocomplete="email" required>

          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>

          <button type="submit" id="btn-login" class="btn btn-principal" disabled>AGUARDE...</button>
        </form>

        <div id="mensagem" class="mensagem">Verificando sessão anterior...</div>
      </div>

      <div id="painel-admin" class="painel-admin">
        <div class="topbar">
          <div>
            <h2>Painel de Aprovação</h2>
            <p id="admin-logado">Administrador conectado.</p>
          </div>

          <div class="acoes-topo">
            <button id="btn-atualizar" class="btn btn-secundario" type="button">ATUALIZAR LISTA</button>
            <button id="btn-sair" class="btn btn-secundario" type="button">SAIR</button>
          </div>
        </div>

        <div id="contador" class="contador">Carregando cadastros pendentes...</div>
        <div id="lista-pendentes" class="lista"></div>
      </div>

      <a href="./index.html" class="link-voltar">Voltar para a página inicial</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDB1OvsClJ1enHm_tzYnje386fVvmnOq5M",
      authDomain: "mobyauh-48f39.firebaseapp.com",
      projectId: "mobyauh-48f39",
      storageBucket: "mobyauh-48f39.firebasestorage.app",
      messagingSenderId: "958782206989",
      appId: "1:958782206989:web:af7d62c9117df8af151144"
    };

    const ADMIN_EMAIL = "ibftap@gmail.com";
    const TIPOS_SERVICO_VALIDOS = ["carro", "moto"];

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const blocoLogin = document.getElementById("bloco-login");
    const painelAdmin = document.getElementById("painel-admin");
    const formLogin = document.getElementById("form-login");
    const mensagem = document.getElementById("mensagem");
    const btnLogin = document.getElementById("btn-login");
    const btnAtualizar = document.getElementById("btn-atualizar");
    const btnSair = document.getElementById("btn-sair");
    const listaPendentes = document.getElementById("lista-pendentes");
    const contador = document.getElementById("contador");
    const adminLogado = document.getElementById("admin-logado");

    let verificacaoInicialConcluida = false;
    let loginEmAndamento = false;

    function mostrarMensagem(texto, cor) {
      mensagem.innerText = texto;
      mensagem.style.color = cor;
    }

    function habilitarLogin() {
      btnLogin.disabled = false;
      btnLogin.textContent = "ENTRAR NO PAINEL";
    }

    function mostrarLogin() {
      blocoLogin.style.display = "block";
      painelAdmin.style.display = "none";
    }

    function mostrarPainel(emailAdmin) {
      blocoLogin.style.display = "none";
      painelAdmin.style.display = "block";
      adminLogado.innerText = "Administrador conectado: " + emailAdmin;
    }

    function formatarData(valor) {
      if (!valor) return "-";
      const data = new Date(valor);
      if (isNaN(data.getTime())) return valor;
      return data.toLocaleString("pt-BR");
    }

    function normalizarTipoServico(tipoServico) {
      const valor = String(tipoServico || "").trim().toLowerCase();
      return TIPOS_SERVICO_VALIDOS.includes(valor) ? valor : "carro";
    }

    function obterLabelServico(tipoServico) {
      return normalizarTipoServico(tipoServico) === "moto" ? "Moto" : "Carro";
    }

    function obterServicosHabilitadosUsuario(usuario) {
      const lista = Array.isArray(usuario && usuario.servicosHabilitados)
        ? usuario.servicosHabilitados.map(normalizarTipoServico)
        : [];

      const unicos = [];
      lista.forEach(function(item) {
        if (!unicos.includes(item)) {
          unicos.push(item);
        }
      });

      if (!unicos.length) {
        return ["carro"];
      }

      return unicos;
    }

    function formatarListaServicos(servicos) {
      return obterServicosHabilitadosUsuario({ servicosHabilitados: servicos })
        .map(function(item) {
          return obterLabelServico(item);
        })
        .join(" / ");
    }

    function criarLinha(rotulo, valor) {
      const linha = document.createElement("div");
      linha.className = "linha";

      const strong = document.createElement("strong");
      strong.textContent = rotulo;

      const span = document.createElement("span");
      span.textContent = valor || "-";

      linha.appendChild(strong);
      linha.appendChild(span);

      return linha;
    }

    function criarFotoArea(fotoURL) {
      const fotoArea = document.createElement("div");
      fotoArea.className = "foto-area";

      if (fotoURL) {
        const img = document.createElement("img");
        img.className = "foto-usuario";
        img.src = fotoURL;
        img.alt = "Foto do usuário";
        img.loading = "lazy";
        fotoArea.appendChild(img);
      } else {
        const semFoto = document.createElement("div");
        semFoto.className = "sem-foto";
        semFoto.textContent = "Sem foto enviada";
        fotoArea.appendChild(semFoto);
      }

      return fotoArea;
    }

    function criarBadgesUsuario(usuario) {
      const wrapper = document.createElement("div");
      wrapper.className = "badges-card";

      const badgeTipo = document.createElement("div");
      badgeTipo.className = "badge-card " + (usuario.tipo === "passageiro" ? "badge-passageiro" : "badge-tipo");
      badgeTipo.textContent = usuario.tipo === "passageiro" ? "PASSAGEIRO" : "MOTORISTA";
      wrapper.appendChild(badgeTipo);

      if (usuario.tipo === "motorista") {
        const badgeServico = document.createElement("div");
        badgeServico.className = "badge-card badge-servico";
        badgeServico.textContent = "SERVIÇOS: " + formatarListaServicos(usuario.servicosHabilitados).toUpperCase();
        wrapper.appendChild(badgeServico);
      }

      return wrapper;
    }

    function mostrarVazio(texto) {
      listaPendentes.innerHTML = "";
      const vazio = document.createElement("div");
      vazio.className = "vazio";
      vazio.textContent = texto;
      listaPendentes.appendChild(vazio);
    }

    async function aprovarUsuario(id) {
      const confirmar = confirm("Deseja realmente APROVAR este cadastro?");
      if (!confirmar) return;

      try {
        const user = auth.currentUser;
        const docRef = db.collection("usuarios").doc(id);
        const docSnap = await docRef.get();

        if (!docSnap.exists) {
          throw new Error("Cadastro não encontrado.");
        }

        const dadosUsuario = docSnap.data() || {};
        const atualizacao = {
          status: "aprovado",
          aprovadoEm: new Date().toISOString(),
          aprovadoPor: user ? user.email : "admin"
        };

        if (dadosUsuario.tipo === "motorista") {
          atualizacao.servicosHabilitados = obterServicosHabilitadosUsuario(dadosUsuario);
        }

        await docRef.update(atualizacao);

        alert("Cadastro aprovado com sucesso.");
        await carregarPendentes();
      } catch (error) {
        alert("Erro ao aprovar cadastro: " + error.message);
      }
    }

    async function rejeitarUsuario(id) {
      const confirmar = confirm("Deseja realmente REJEITAR este cadastro?");
      if (!confirmar) return;

      try {
        const user = auth.currentUser;

        await db.collection("usuarios").doc(id).update({
          status: "rejeitado",
          rejeitadoEm: new Date().toISOString(),
          rejeitadoPor: user ? user.email : "admin"
        });

        alert("Cadastro rejeitado com sucesso.");
        await carregarPendentes();
      } catch (error) {
        alert("Erro ao rejeitar cadastro: " + error.message);
      }
    }

    async function carregarPendentes() {
      try {
        contador.innerText = "Carregando cadastros pendentes...";
        listaPendentes.innerHTML = "";

        const snap = await db.collection("usuarios")
          .where("status", "==", "pendente")
          .get();

        const usuarios = [];

        snap.forEach(function(doc) {
          usuarios.push({
            id: doc.id,
            ...doc.data()
          });
        });

        usuarios.sort(function(a, b) {
          const ordemTipoA = a.tipo === "motorista" ? 0 : 1;
          const ordemTipoB = b.tipo === "motorista" ? 0 : 1;

          if (ordemTipoA !== ordemTipoB) {
            return ordemTipoA - ordemTipoB;
          }

          return new Date(b.data || 0) - new Date(a.data || 0);
        });

        const totalMotoristas = usuarios.filter(function(usuario) {
          return usuario.tipo === "motorista";
        }).length;

        const totalPassageiros = usuarios.filter(function(usuario) {
          return usuario.tipo === "passageiro";
        }).length;

        contador.innerText =
          "Cadastros pendentes encontrados: " + usuarios.length +
          " • Motoristas: " + totalMotoristas +
          " • Passageiros: " + totalPassageiros;

        if (usuarios.length === 0) {
          mostrarVazio("Nenhum cadastro pendente no momento.");
          return;
        }

        usuarios.forEach(function(usuario) {
          const card = document.createElement("div");
          card.className = "card" + (usuario.tipo === "passageiro" ? " card-passageiro" : "");

          const titulo = document.createElement("h3");
          titulo.textContent = usuario.tipo === "motorista" ? "Cadastro de Motorista" : "Cadastro de Passageiro";
          card.appendChild(titulo);

          card.appendChild(criarBadgesUsuario(usuario));
          card.appendChild(criarFotoArea(usuario.fotoURL));
          card.appendChild(criarLinha("Nome", usuario.nome));
          card.appendChild(criarLinha("E-mail", usuario.email));
          card.appendChild(criarLinha("Cidade", usuario.cidade));
          card.appendChild(criarLinha("Telefone", usuario.telefone));
          card.appendChild(criarLinha("Status", usuario.status));
          card.appendChild(criarLinha("Data do cadastro", formatarData(usuario.data)));

          if (usuario.tipo === "motorista") {
            card.appendChild(criarLinha("Serviços habilitados", formatarListaServicos(usuario.servicosHabilitados)));
            card.appendChild(criarLinha("CNH", usuario.cnh));
            card.appendChild(criarLinha("Placa", usuario.placa));
          }

          if (usuario.tipo === "passageiro") {
            card.appendChild(criarLinha("CPF", usuario.cpf));
          }

          const acoes = document.createElement("div");
          acoes.className = "card-acoes";

          const btnAprovar = document.createElement("button");
          btnAprovar.className = "btn btn-principal";
          btnAprovar.type = "button";
          btnAprovar.textContent = "APROVAR";
          btnAprovar.addEventListener("click", function() {
            aprovarUsuario(usuario.id);
          });

          const btnRejeitar = document.createElement("button");
          btnRejeitar.className = "btn btn-rejeitar";
          btnRejeitar.type = "button";
          btnRejeitar.textContent = "REJEITAR";
          btnRejeitar.addEventListener("click", function() {
            rejeitarUsuario(usuario.id);
          });

          acoes.appendChild(btnAprovar);
          acoes.appendChild(btnRejeitar);
          card.appendChild(acoes);

          listaPendentes.appendChild(card);
        });
      } catch (error) {
        contador.innerText = "Erro ao carregar cadastros.";
        mostrarVazio("Erro: " + error.message);
      }
    }

    formLogin.addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!verificacaoInicialConcluida) {
        mostrarMensagem("Aguarde a verificação inicial terminar.", "#ffcc00");
        return;
      }

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      loginEmAndamento = true;
      btnLogin.disabled = true;
      btnLogin.textContent = "ENTRANDO...";
      mostrarMensagem("Limpando sessão anterior e entrando no painel...", "#ffcc00");

      try {
        await auth.signOut();
        await auth.signInWithEmailAndPassword(email, senha);
      } catch (error) {
        loginEmAndamento = false;
        mostrarMensagem("Erro no login: " + error.message, "#ff6666");
        habilitarLogin();
      }
    });

    btnAtualizar.addEventListener("click", async function() {
      await carregarPendentes();
    });

    btnSair.addEventListener("click", async function() {
      await auth.signOut();
      formLogin.reset();
      mostrarLogin();
      mostrarMensagem("Você saiu do painel administrativo.", "#00ff88");
      habilitarLogin();
    });

    auth.onAuthStateChanged(async function(user) {
      if (loginEmAndamento && !user) {
        return;
      }

      if (user) {
        if (user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
          mostrarPainel(user.email);
          await carregarPendentes();
          mostrarMensagem("", "#ffffff");
          loginEmAndamento = false;
          verificacaoInicialConcluida = true;
          habilitarLogin();
          return;
        } else {
          await auth.signOut();
          mostrarLogin();
          mostrarMensagem("Acesso negado. Este e-mail não é administrador.", "#ff6666");
          loginEmAndamento = false;
          verificacaoInicialConcluida = true;
          habilitarLogin();
          return;
        }
      }

      mostrarLogin();
      if (!verificacaoInicialConcluida) {
        mostrarMensagem("Faça login com a conta do administrador.", "#ffcc00");
      }
      loginEmAndamento = false;
      verificacaoInicialConcluida = true;
      habilitarLogin();
    });
  </script>
</body>
</html>

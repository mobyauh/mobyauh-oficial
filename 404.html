<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBYAUH - Redirecionando</title>
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-mobyauh.png">
  <link rel="apple-touch-icon" href="./assets/icon-mobyauh.png">
  <meta name="theme-color" content="#FFCC00">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #111111, #1a1a1a 45%, #101010);
      color: #ffffff;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #232323;
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      overflow: hidden;
      margin: 0 auto 16px;
      background: #FFCC00;
      box-shadow: 0 12px 24px rgba(255,204,0,0.18);
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    h1 { color: #FFCC00; font-size: 1.8rem; margin-bottom: 10px; }
    p { color: #e4e4e4; line-height: 1.7; margin-bottom: 12px; }
    a {
      display: inline-block;
      margin-top: 8px;
      text-decoration: none;
      background: #FFCC00;
      color: #111111;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="./assets/icon-mobyauh.png" alt="Ícone oficial MOBYAUH">
    </div>
    <h1>MOBYAUH</h1>
    <p>Essa página não foi encontrada no GitHub Pages.</p>
    <p>Você será levado de volta para a página inicial automaticamente.</p>
    <a id="voltar" href="./index.html">Voltar agora</a>
  </div>

  <script>
    function detectarBaseApp() {
      const host = window.location.hostname;
      const partes = window.location.pathname.split('/').filter(Boolean);

      if (host.endsWith('github.io')) {
        if (partes.length > 0) {
          return '/' + partes[0] + '/';
        }
        return '/';
      }

      return './';
    }

    const destino = detectarBaseApp() + 'index.html';
    document.getElementById('voltar').href = destino;
    setTimeout(function () {
      window.location.href = destino;
    }, 2500);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBYAUH - Cadastro de Passageiro</title>
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/icon-mobyauh.png">
  <link rel="apple-touch-icon" href="../assets/icon-mobyauh.png">
  <meta name="theme-color" content="#FFCC00">
  <link rel="stylesheet" href="./global.css">
  <style>
    .brand-area {
      background: linear-gradient(180deg, rgba(255, 204, 0, 0.06), rgba(255, 204, 0, 0.02));
      border: 1px solid rgba(255, 204, 0, 0.10);
      border-radius: 22px;
      padding: 24px 18px 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .logo-ring {
      width: 128px;
      height: 128px;
      margin: 0 auto 18px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 204, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 204, 0, 0.08);
    }

    .logo-box {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: #FFCC00;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        0 14px 24px rgba(255, 204, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.25);
      margin: 0 auto;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-name {
      color: #FFCC00;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .brand-line {
      width: 80px;
      height: 4px;
      border-radius: 999px;
      background: #FFCC00;
      margin: 0 auto 14px;
    }

    .subtitulo {
      color: #d8d8d8;
      margin-bottom: 0;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 290px;
      margin-left: auto;
      margin-right: auto;
    }

    .upload-box {
      margin-bottom: 16px;
      text-align: left;
    }

    .upload-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #f2f2f2;
    }

    .upload-input {
      width: 100%;
      background-color: #3a3a3a;
      border: 1px solid #4a4a4a;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .preview-box {
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .preview-box img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 18px;
      border: 3px solid #FFCC00;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .preview-text {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #d7d7d7;
    }

    .info-foto {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #aaaaaa;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .logo-ring {
        width: 118px;
        height: 118px;
      }

      .logo-box {
        width: 88px;
        height: 88px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-area">
      <div class="logo-ring">
        <div class="logo-box">
          <img src="../assets/icon-mobyauh.png" alt="Ícone oficial MOBYAUH">
        </div>
      </div>

      <div class="logo-name">MOBYAUH</div>
      <div class="brand-line"></div>
      <h2>Cadastro Passageiro</h2>
      <p class="subtitulo">Solicite seu acesso à plataforma</p>
    </div>

    <form id="form-passageiro">
      <input type="text" id="nome" placeholder="Nome completo" required>
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="password" id="senha" placeholder="Senha" required>

      <select id="cidade" required>
        <option value="" disabled selected>Selecione sua cidade</option>
        <option value="Portel">Portel</option>
        <option value="Breves">Breves</option>
        <option value="Melgaço">Melgaço</option>
        <option value="Bagre">Bagre</option>
        <option value="Curralinho">Curralinho</option>
      </select>

      <input type="text" id="cpf" placeholder="CPF" required>
      <input type="text" id="telefone" placeholder="WhatsApp" required>

      <div class="upload-box">
        <label for="foto" class="upload-label">Foto do passageiro</label>
        <input type="file" id="foto" class="upload-input" accept="image/*" capture="user" required>
        <div class="info-foto">Envie uma foto nítida do rosto para identificação.</div>

        <div class="preview-box" id="preview-box">
          <img id="preview-img" alt="Prévia da foto">
          <div class="preview-text">Prévia da foto selecionada</div>
        </div>
      </div>

      <button type="submit" id="btn-cadastrar">SOLICITAR ACESSO</button>
    </form>

    <div id="status-msg" class="mensagem-status"></div>
    <a href="../index.html" class="link-voltar">Voltar</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDB1OvsClJ1enHm_tzYnje386fVvmnOq5M",
      authDomain: "mobyauh-48f39.firebaseapp.com",
      projectId: "mobyauh-48f39",
      storageBucket: "mobyauh-48f39.firebasestorage.app",
      messagingSenderId: "958782206989",
      appId: "1:958782206989:web:af7d62c9117df8af151144"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const form = document.getElementById('form-passageiro');
    const btn = document.getElementById('btn-cadastrar');
    const msg = document.getElementById('status-msg');
    const fotoInput = document.getElementById('foto');
    const previewBox = document.getElementById('preview-box');
    const previewImg = document.getElementById('preview-img');

    fotoInput.addEventListener('change', function () {
      const file = fotoInput.files[0];

      if (!file) {
        previewBox.style.display = 'none';
        previewImg.src = '';
        return;
      }

      const objectURL = URL.createObjectURL(file);
      previewImg.src = objectURL;
      previewBox.style.display = 'block';
    });

    async function enviarFotoParaStorage(file, uid) {
      const extensaoOriginal = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'jpg';
      const nomeArquivo = 'foto_' + Date.now() + '.' + extensaoOriginal;
      const caminho = 'usuarios/passsageiros/' + uid + '/' + nomeArquivo;
      const storageRef = storage.ref(caminho);

      await storageRef.put(file);
      const url = await storageRef.getDownloadURL();
      return url;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      btn.disabled = true;
      btn.innerText = 'ENVIANDO...';
      msg.style.color = '#ffffff';
      msg.innerText = '';

      let userCriado = null;

      try {
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const cidade = document.getElementById('cidade').value;
        const cpf = document.getElementById('cpf').value.trim();
        const telefone = document.getElementById('telefone').value.trim();
        const fotoFile = fotoInput.files[0];

        if (!fotoFile) {
          throw new Error('Selecione uma foto do passageiro.');
        }

        if (fotoFile.size > 3 * 1024 * 1024) {
          throw new Error('A foto deve ter no máximo 3MB.');
        }

        userCriado = await auth.createUserWithEmailAndPassword(email, senha);
        const uid = userCriado.user.uid;

        msg.style.color = '#FFCC00';
        msg.innerText = 'Enviando foto...';

        const fotoURL = await enviarFotoParaStorage(fotoFile, uid);

        msg.style.color = '#FFCC00';
        msg.innerText = 'Salvando cadastro...';

        await db.collection('usuarios').doc(uid).set({
          uid: uid,
          nome: nome,
          email: email,
          cidade: cidade,
          cpf: cpf,
          telefone: telefone,
          tipo: 'passageiro',
          status: 'pendente',
          fotoURL: fotoURL,
          data: new Date().toISOString()
        });

        await auth.signOut();

        msg.style.color = '#00FF88';
        msg.innerText = 'Solicitação enviada com sucesso!';

        setTimeout(function () {
          window.location.href = './aguardando.html';
        }, 1500);

      } catch (error) {
        if (auth.currentUser) {
          try {
            await auth.currentUser.delete();
          } catch (e) {
          }
        }

        msg.style.color = '#FF5555';
        msg.innerText = 'Erro: ' + error.message;
        btn.disabled = false;
        btn.innerText = 'SOLICITAR ACESSO';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBYAUH - Cadastro Oficial</title>
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/icon-mobyauh.png">
  <link rel="apple-touch-icon" href="../assets/icon-mobyauh.png">
  <meta name="theme-color" content="#FFCC00">
  <link rel="stylesheet" href="./global.css">
  <style>
    .container {
      max-width: 430px;
      text-align: center;
      background: #232323;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 26px;
      padding: 30px 24px 28px;
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.50),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .brand-area {
      background: linear-gradient(180deg, rgba(255, 204, 0, 0.06), rgba(255, 204, 0, 0.02));
      border: 1px solid rgba(255, 204, 0, 0.10);
      border-radius: 22px;
      padding: 24px 18px 20px;
      margin-bottom: 24px;
    }

    .logo-ring {
      width: 128px;
      height: 128px;
      margin: 0 auto 18px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 204, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 204, 0, 0.08);
    }

    .logo-box {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: #FFCC00;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 14px 24px rgba(255, 204, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      margin: 0 auto;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-name {
      color: #FFCC00;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    h2 {
      color: #FFCC00;
      margin-bottom: 8px;
      font-size: 1.7rem;
      text-transform: uppercase;
    }

    .subtitulo {
      color: #d8d8d8;
      margin-bottom: 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    form {
      margin-top: 0;
    }

    input,
    select {
      width: 100%;
      background-color: #3a3a3a;
      border: 1px solid #4a4a4a;
      color: #fff;
      padding: 14px 15px;
      margin-bottom: 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #aaaaaa;
    }

    input:focus,
    select:focus {
      border-color: #FFCC00;
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
    }

    #btn-acao {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      cursor: pointer;
      background: #FFCC00;
      color: #1a1a1a;
      box-shadow: 0 10px 20px rgba(255, 204, 0, 0.15);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    #btn-acao:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    #btn-acao:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #status-msg {
      margin-top: 15px;
      min-height: 24px;
      font-weight: 700;
    }

    .link-voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #FFCC00;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .link-voltar:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 20px;
      }

      .logo-ring {
        width: 118px;
        height: 118px;
      }

      .logo-box {
        width: 88px;
        height: 88px;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-area">
      <div class="logo-ring">
        <div class="logo-box">
          <img src="../assets/icon-mobyauh.png" alt="Ícone oficial MOBYAUH">
        </div>
      </div>
      <div class="logo-name">MOBYAUH</div>
      <h2>Cadastro Passageiro</h2>
      <p class="subtitulo">Finalize seu cadastro oficial para solicitar acesso à plataforma.</p>
    </div>

    <form id="form-registro">
      <input type="text" id="nome" placeholder="Nome completo" required>
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <select id="cidade" required>
        <option value="" disabled selected>Selecione sua cidade</option>
        <option value="Portel">Portel</option>
        <option value="Breves">Breves</option>
        <option value="Melgaço">Melgaço</option>
        <option value="Bagre">Bagre</option>
        <option value="Curralinho">Curralinho</option>
      </select>
      <button type="submit" id="btn-acao">FINALIZAR CADASTRO</button>
    </form>

    <div id="status-msg"></div>
    <a href="../index.html" class="link-voltar">Voltar</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDB1OvsClJ1enHm_tzYnje386fVvmnOq5M",
      authDomain: "mobyauh-48f39.firebaseapp.com",
      projectId: "mobyauh-48f39",
      storageBucket: "mobyauh-48f39.firebasestorage.app",
      messagingSenderId: "958782206989",
      appId: "1:958782206989:web:af7d62c9117df8af151144"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById('form-registro').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-acao');
      const msg = document.getElementById('status-msg');

      btn.disabled = true;
      btn.innerText = 'PROCESSANDO...';
      msg.style.color = '#ffffff';
      msg.innerText = '';

      try {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;

        const cred = await auth.createUserWithEmailAndPassword(email, senha);

        await db.collection('usuarios').doc(cred.user.uid).set({
          nome: document.getElementById('nome').value.trim(),
          email: email,
          cidade: document.getElementById('cidade').value,
          tipo: 'passageiro',
          data: new Date().toISOString()
        });

        msg.innerHTML = "<span style='color:#00FF88'>Sucesso! Redirecionando...</span>";
        setTimeout(() => { window.location.href = 'aguardando.html'; }, 2000);

      } catch (error) {
        console.error(error);
        msg.innerHTML = `<span style='color:#FF5555'>Erro: ${error.message}</span>`;
        btn.disabled = false;
        btn.innerText = 'FINALIZAR CADASTRO';
      }
    });
  </script>
</body>
</html>
